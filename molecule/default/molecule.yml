---
driver:
  name: docker
platforms:
  - name: archlinux
    image: archlinux/archlinux:latest
    command: /usr/sbin/init
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true

  - name: ubuntu
    image: geerlingguy/docker-ubuntu2404-ansible:latest
    command: ""
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true

  - name: debian
    image: geerlingguy/docker-debian12-ansible:latest
    command: ""
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true

provisioner:
  name: ansible
verifier:
  name: ansible

# Explicit test sequence to suppress warnings for unused steps.
# Uncomment dependency/cleanup/side_effect when the role needs them.
scenario:
  test_sequence:
    # - dependency  # enable when requirements.yml or collections.yml is added
    # - cleanup     # enable when a cleanup.yml playbook is added
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    # - side_effect  # enable when a side_effect.yml playbook is added
    - verify
    # - cleanup
    - destroy
